  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ter;gap:8px;background:transparent;border:1px solid var(--border);color:var(--fg);padding:8px 12px;border-radius:999px;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px\" style-hover=\"border-color:var(--wine)\">\n            <span aria-hidden=\"true\" style=\"width:14px;height:14px;border-radius:50%;border:2px solid var(--wine);background:{{ themeDotBg }}\"><\u002Fspan>\n            {{ themeBtnText }}\n          <\u002Fbutton>\n          <a href=\"#kontakt\" style=\"margin-left:4px;background:var(--wine);color:var(--on-wine);padding:10px 18px;border-radius:999px;white-space:nowrap;text-decoration:none;font-weight:700;font-size:15px\" style-hover=\"filter:brightness(1.06)\">Schreib mir<\u002Fa>\n        <\u002Fnav>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ mobileNav }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;align-items:center;gap:10px\">\n          <button type=\"button\" onclick=\"{{ toggleTheme }}\" aria-label=\"{{ themeBtnLabel }}\" style=\"display:flex;align-items:center;justify-content:center;width:42px;height:42px;background:transparent;border:1px solid var(--border);color:var(--fg);border-radius:999px;cursor:pointer\">\n            <span aria-hidden=\"true\" style=\"width:15px;height:15px;border-radius:50%;border:2px solid var(--wine);background:{{ themeDotBg }}\"><\u002Fspan>\n          <\u002Fbutton>\n          <button type=\"button\" onclick=\"{{ toggleMenu }}\" aria-label=\"Menü öffnen oder schließen\" aria-expanded=\"{{ menuOpen }}\" style=\"display:flex;flex-direction:column;justify-content:center;gap:5px;width:44px;height:44px;align-items:center;background:transparent;border:1px solid var(--border);border-radius:12px;cursor:pointer;padding:0\">\n            <span aria-hidden=\"true\" style=\"width:20px;height:2px;background:var(--fg);border-radius:2px\"><\u002Fspan>\n            <span aria-hidden=\"true\" style=\"width:20px;height:2px;background:var(--fg);border-radius:2px\"><\u002Fspan>\n            <span aria-hidden=\"true\" style=\"width:20px;height:2px;background:var(--fg);border-radius:2px\"><\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ showMobileMenu }}\" hint-placeholder-val=\"{{ false }}\">\n      <nav aria-label=\"Hauptnavigation\" style=\"border-top:1px solid var(--border);background:var(--surface);padding:10px clamp(18px,5vw,56px) 18px;display:flex;flex-direction:column;gap:2px\">\n        <a href=\"#beziehung\" onclick=\"{{ closeMenu }}\" style=\"padding:13px 8px;text-decoration:none;font-weight:600;font-size:17px;border-bottom:1px solid var(--border)\">Beziehung<\u002Fa>\n        <a href=\"#angebot\" onclick=\"{{ closeMenu }}\" style=\"padding:13px 8px;text-decoration:none;font-weight:600;font-size:17px;border-bottom:1px solid var(--border)\">Angebot<\u002Fa>\n        <a href=\"#ueber-mich\" onclick=\"{{ closeMenu }}\" style=\"padding:13px 8px;text-decoration:none;font-weight:600;font-size:17px;border-bottom:1px solid var(--border)\">Über mich<\u002Fa>\n        <a href=\"#kurse\" onclick=\"{{ closeMenu }}\" style=\"padding:13px 8px;text-decoration:none;font-weight:600;font-size:17px;border-bottom:1px solid var(--border)\">Kurse<\u002Fa>\n        <a href=\"#tierschutz\" onclick=\"{{ closeMenu }}\" style=\"padding:13px 8px;text-decoration:none;font-weight:600;font-size:17px;border-bottom:1px solid var(--border)\">Tierschutz<\u002Fa>\n        <a href=\"#kontakt\" onclick=\"{{ closeMenu }}\" style=\"margin-top:12px;background:var(--wine);color:var(--on-wine);padding:14px;border-radius:12px;text-decoration:none;font-weight:700;text-align:center;font-size:17px\">Schreib mir<\u002Fa>\n      <\u002Fnav>\n    <\u002Fsc-if>\n  <\u002Fheader>\n\n  <main id=\"hauptinhalt\">\n\n    <!-- ============ HERO: VOLLBILD ============ -->\n    <sc-if value=\"{{ heroVollbild }}\" hint-placeholder-val=\"{{ true }}\">\n      <section aria-label=\"Willkommen\" style=\"position:relative;min-height:clamp(460px,82vh,820px);display:flex;align-items:flex-end;background:var(--surface-2);background-image:repeating-linear-gradient(135deg, var(--surface-2) 0 22px, var(--surface-3) 22px 44px);overflow:hidden\">\n        <span aria-hidden=\"true\" style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;letter-spacing:.04em;color:var(--muted);text-align:center;padding:24px\">FOTO&nbsp;.webp&nbsp;—&nbsp;Anna&nbsp;mit&nbsp;Hund,&nbsp;quer,&nbsp;hochauflösend<\u002Fspan>\n        <div aria-hidden=\"true\" style=\"position:absolute;inset:0;background:linear-gradient(to top, rgba(20,12,11,.82) 0%, rgba(20,12,11,.45) 38%, rgba(20,12,11,.08) 72%, transparent 100%)\"><\u002Fdiv>\n        <div style=\"position:relative;max-width:1200px;width:100%;margin:0 auto;padding:clamp(36px,6vw,84px) clamp(18px,5vw,56px)\">\n          <span style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.14);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.28);color:#fff;padding:7px 15px;border-radius:999px;font-weight:600;font-size:13.5px;letter-spacing:.02em\">\n            <span aria-hidden=\"true\" style=\"width:8px;height:8px;border-radius:50%;background:var(--wine)\"><\u002Fspan>Hundetraining in Berlin Rudow\n          <\u002Fspan>\n          <h1 style=\"color:#fff;font-size:clamp(2.4rem,6.4vw,5rem);line-height:1.02;letter-spacing:-.03em;font-weight:800;margin:18px 0 0;max-width:16ch;text-wrap:balance\">Alles beginnt mit der Beziehung.<\u002Fh1>\n          <p style=\"color:rgba(255,255,255,.9);font-size:clamp(1.05rem,2vw,1.3rem);max-width:46ch;margin:18px 0 0;line-height:1.5\">Einfühlsames Training für dich und deinen Hund – auf Vertrauen gebaut, nicht auf Druck.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:12px;margin-top:30px\">\n            <a href=\"#kontakt\" style=\"background:var(--wine);color:var(--on-wine);padding:15px 26px;border-radius:999px;white-space:nowrap;text-decoration:none;font-weight:700;font-size:17px\" style-hover=\"filter:brightness(1.07)\">Lass uns reden<\u002Fa>\n            <a href=\"#angebot\" style=\"background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.4);color:#fff;padding:15px 26px;border-radius:999px;white-space:nowrap;text-decoration:none;font-weight:600;font-size:17px\" style-hover=\"background:rgba(255,255,255,.2)\">Angebot ansehen<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ============ HERO: SPLIT ============ -->\n    <sc-if value=\"{{ heroSplit }}\" hint-placeholder-val=\"{{ false }}\">\n      <section aria-label=\"Willkommen\" style=\"max-width:1200px;margin:0 auto;padding:clamp(32px,5vw,64px) clamp(18px,5vw,56px);display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:clamp(28px,4vw,56px);align-items:center\">\n        <div>\n          <span style=\"display:inline-flex;align-items:center;gap:8px;background:var(--wine-tint);color:var(--wine);padding:7px 15px;border-radius:999px;font-weight:700;font-size:13.5px;letter-spacing:.02em\"><span aria-hidden=\"true\" style=\"width:8px;height:8px;border-radius:50%;background:var(--wine)\"><\u002Fspan>Hundetraining in Berlin Rudow<\u002Fspan>\n          <h1 style=\"font-size:clamp(2.3rem,5.4vw,4.4rem);line-height:1.03;letter-spacing:-.03em;font-weight:800;margin:18px 0 0;text-wrap:balance\">Alles beginnt mit der Beziehung.<\u002Fh1>\n          <p style=\"color:var(--muted);font-size:clamp(1.05rem,2vw,1.3rem);max-width:44ch;margin:18px 0 0\">Einfühlsames Training für dich und deinen Hund – auf Vertrauen gebaut, nicht auf Druck.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:12px;margin-top:30px\">\n            <a href=\"#kontakt\" style=\"background:var(--wine);color:var(--on-wine);padding:15px 26px;border-radius:999px;white-space:nowrap;text-decoration:none;font-weight:700;font-size:17px\" style-hover=\"filter:brightness(1.07)\">Lass uns reden<\u002Fa>\n            <a href=\"#angebot\" style=\"border:1px solid var(--border);color:var(--fg);padding:15px 26px;border-radius:999px;white-space:nowrap;text-decoration:none;font-weight:600;font-size:17px\" style-hover=\"border-color:var(--wine)\">Angebot ansehen<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:relative;aspect-ratio:4/5;border-radius:26px;overflow:hidden;background:var(--surface-2);background-image:repeating-linear-gradient(135deg, var(--surface-2) 0 22px, var(--surface-3) 22px 44px);border:1px solid var(--border)\">\n          <span aria-hidden=\"true\" style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,Menlo,monospace;font-size:13px;color:var(--muted);text-align:center;padding:24px\">FOTO&nbsp;.webp&nbsp;—&nbsp;Anna&nbsp;mit&nbsp;Hund,&nbsp;hochkant<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ============ HERO: ZENTRIERT ============ -->\n    <sc-if value=\"{{ heroZentriert }}\" hint-placeholder-val=\"{{ false }}\">\n      <section aria-label=\"Willkommen\" style=\"max-width:980px;margin:0 auto;padding:clamp(40px,6vw,90px) clamp(18px,5vw,56px) clamp(20px,3vw,40px);text-align:center;display:flex;flex-direction:column;align-items:center\">\n        <span style=\"display:inline-flex;align-items:center;gap:8px;background:var(--wine-tint);color:var(--wine);padding:7px 15px;border-radius:999px;font-weight:700;font-size:13.5px\"><span aria-hidden=\"true\" style=\"width:8px;height:8px;border-radius:50%;background:var(--wine)\"><\u002Fspan>Hundetraining in Berlin Rudow<\u002Fspan>\n        <h1 style=\"font-size:clamp(2.5rem,6.4vw,4.8rem);line-height:1.02;letter-spacing:-.03em;font-weight:800;margin:18px 0 0;max-width:15ch;text-wrap:balance\">Alles beginnt mit der Beziehung.<\u002Fh1>\n        <p style=\"color:var(--muted);font-size:clamp(1.05rem,2vw,1.3rem);max-width:46ch;margin:18px auto 0\">Einfühlsames Training für dich und deinen Hund – auf Vertrauen gebaut, nicht auf Druck.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:12px;margin-top:28px;justify-content:center\">\n          <a href=\"#kontakt\" style=\"background:var(--wine);color:var(--on-wine);padding:15px 26px;border-radius:999px;white-space:nowrap;text-decoration:none;font-weight:700;font-size:17px\" style-hover=\"filter:brightness(1.07)\">Lass uns reden<\u002Fa>\n          <a href=\"#angebot\" style=\"border:1px solid var(--border);color:var(--fg);padding:15px 26px;border-radius:999px;white-space:nowrap;text-decoration:none;font-weight:600;font-size:17px\" style-hover=\"border-color:var(--wine)\">Angebot ansehen<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"position:relative;width:100%;aspect-ratio:16/8;margin-top:44px;border-radius:26px;overflow:hidden;background:var(--surface-2);background-image:repeating-linear-gradient(135deg, var(--surface-2) 0 22px, var(--surface-3) 22px 44px);border:1px solid var(--border)\">\n          <span aria-hidden=\"true\" style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,Menlo,monospace;font-size:13px;color:var(--muted);text-align:center;padding:24px\">FOTO&nbsp;.webp&nbsp;—&nbsp;Anna&nbsp;mit&nbsp;Hund,&nbsp;quer<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ============ BELIEF / BEZIEHUNG ============ -->\n    <section id=\"beziehung\" style=\"max-width:1200px;margin:0 auto;padding:clamp(56px,9vw,128px) clamp(18px,5vw,56px)\">\n      <div data-reveal=\"\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:clamp(28px,5vw,72px);align-items:start\">\n        <div style=\"position:sticky;top:96px\">\n          <span style=\"font-weight:700;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--wine)\">Meine Haltung<\u002Fspan>\n          <h2 style=\"font-size:clamp(1.9rem,4vw,3rem);line-height:1.08;letter-spacing:-.02em;font-weight:800;margin:14px 0 0;text-wrap:balance\">Eine gesunde Beziehung ist das Fundament.<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:22px\">\n          <p style=\"font-size:clamp(1.15rem,2vw,1.4rem);line-height:1.55;font-weight:500;margin:0\">Wenn mich jemand fragt, was im Zusammenleben mit einem Hund am wichtigsten ist, lautet meine Antwort immer: <strong style=\"color:var(--wine)\">die Beziehung.<\u002Fstrong> Eine gesunde Beziehung, die auf gegenseitigem Vertrauen beruht, ist der Grundpfeiler für ein entspanntes Miteinander – und die Basis für jede Erziehung.<\u002Fp>\n          <p style=\"font-size:clamp(1.02rem,1.6vw,1.15rem);line-height:1.65;color:var(--muted);margin:0\">Stell dir vor, dein Gegenüber wirkt in seinen Entscheidungen unsicher und wankelmütig. Dann fällt es dir schwer, Ratschläge anzunehmen. Genau so geht es unseren Hunden.<\u002Fp>\n          <p style=\"font-size:clamp(1.02rem,1.6vw,1.15rem);line-height:1.65;color:var(--muted);margin:0\">Mein Training setzt deshalb beim Verstehen an: Wie kommuniziert dein Hund? Warum verhält er sich in bestimmten Situationen so, wie er es tut – und warum nimmt er dich manchmal vielleicht nicht ganz ernst? Aus diesem Verständnis und der passenden, klaren menschlichen Reaktion wächst eine solide Beziehung. Und auf ihr baut alles Weitere auf.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ ZIELGRUPPE / BREEDS BAND ============ -->\n    <section aria-label=\"Für wen\" style=\"background:var(--surface-2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)\">\n      <div data-reveal=\"\" style=\"max-width:1200px;margin:0 auto;padding:clamp(40px,6vw,72px) clamp(18px,5vw,56px);text-align:center\">\n        <h2 style=\"font-size:clamp(1.5rem,3vw,2.1rem);font-weight:800;letter-spacing:-.02em;margin:0\">Für alle Rassen und Größen.<\u002Fh2>\n        <p style=\"color:var(--muted);font-size:clamp(1rem,1.6vw,1.15rem);max-width:52ch;margin:14px auto 28px\">Vom Modehund bis zum Tierschutzhund, vom Familienbegleiter bis zum Arbeitshund – jeder Hund ist willkommen.<\u002Fp>\n        <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-wrap:wrap;gap:10px;justify-content:center\">\n          <sc-for list=\"{{ breeds }}\" as=\"b\" hint-placeholder-count=\"7\">\n            <li style=\"background:var(--surface);border:1px solid var(--border);padding:10px 18px;border-radius:999px;font-weight:600;font-size:15px\">{{ b }}<\u002Fli>\n          <\u002Fsc-for>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ ANGEBOT ============ -->\n    <section id=\"angebot\" style=\"max-width:1200px;margin:0 auto;padding:clamp(56px,9vw,128px) clamp(18px,5vw,56px)\">\n      <div data-reveal=\"\" style=\"max-width:60ch;margin-bottom:clamp(32px,5vw,56px)\">\n        <span style=\"font-weight:700;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--wine)\">Angebot<\u002Fspan>\n        <h2 style=\"font-size:clamp(1.9rem,4vw,3rem);line-height:1.08;letter-spacing:-.02em;font-weight:800;margin:14px 0 0;text-wrap:balance\">Training, das zu euch passt.<\u002Fh2>\n        <p style=\"color:var(--muted);font-size:clamp(1.02rem,1.6vw,1.15rem);margin:16px 0 0\">Wir starten dort, wo ihr gerade steht – und bauen Schritt für Schritt auf. Alles individuell, fair und ohne Druck.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Variante: Karten -->\n      <sc-if value=\"{{ showCards }}\" hint-placeholder-val=\"{{ true }}\">\n        <ul style=\"list-style:none;margin:0;padding:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,290px),1fr));gap:clamp(14px,1.8vw,22px)\">\n          <sc-for list=\"{{ offers }}\" as=\"o\" hint-placeholder-count=\"9\">\n            <li data-reveal=\"\" style=\"background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:clamp(22px,2.4vw,30px);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:12px\" style-hover=\"border-color:var(--wine);transform:translateY(-3px)\">\n              <span aria-hidden=\"true\" style=\"width:46px;height:46px;border-radius:50%;border:2px solid var(--wine);display:flex;align-items:center;justify-content:center;flex:0 0 auto\">\n                <span style=\"width:14px;height:14px;border-radius:50%;background:var(--wine-tint);border:2px solid var(--wine)\"><\u002Fspan>\n              <\u002Fspan>\n              <h3 style=\"font-size:1.22rem;font-weight:700;letter-spacing:-.01em;margin:4px 0 0\">{{ o.title }}<\u002Fh3>\n              <p style=\"color:var(--muted);font-size:.99rem;line-height:1.55;margin:0\">{{ o.desc }}<\u002Fp>\n              <sc-if value=\"{{ o.badge }}\" hint-placeholder-val=\"\">\n                <span style=\"align-self:flex-start;margin-top:2px;background:var(--wine-tint);color:var(--wine);font-weight:700;font-size:12.5px;padding:5px 11px;border-radius:999px\">{{ o.badge }}<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fli>\n          <\u002Fsc-for>\n        <\u002Ful>\n      <\u002Fsc-if>\n\n      <!-- Variante: Liste / Alternierend -->\n      <sc-if value=\"{{ showList }}\" hint-placeholder-val=\"{{ false }}\">\n        <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:14px\">\n          <sc-for list=\"{{ offers }}\" as=\"o\" hint-placeholder-count=\"9\">\n            <li data-reveal=\"\" style=\"background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:clamp(20px,2.4vw,30px) clamp(20px,2.6vw,34px);box-shadow:var(--shadow);display:flex;align-items:center;gap:clamp(18px,3vw,32px);flex-direction:{{ o.dir }}\" style-hover=\"border-color:var(--wine)\">\n              <span aria-hidden=\"true\" style=\"font-size:clamp(1.6rem,4vw,2.6rem);font-weight:800;color:var(--wine);font-variant-numeric:tabular-nums;flex:0 0 auto;min-width:1.6em;text-align:center;opacity:.85\">{{ o.num }}<\u002Fspan>\n              <div style=\"flex:1 1 auto\">\n                <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap\">\n                  <h3 style=\"font-size:clamp(1.2rem,2vw,1.5rem);font-weight:700;letter-spacing:-.01em;margin:0\">{{ o.title }}<\u002Fh3>\n                  <sc-if value=\"{{ o.badge }}\" hint-placeholder-val=\"\">\n                    <span style=\"background:var(--wine-tint);color:var(--wine);font-weight:700;font-size:12.5px;padding:5px 11px;border-radius:999px\">{{ o.badge }}<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <p style=\"color:var(--muted);font-size:clamp(1rem,1.5vw,1.1rem);line-height:1.55;margin:8px 0 0;max-width:62ch\">{{ o.desc }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fli>\n          <\u002Fsc-for>\n        <\u002Ful>\n      <\u002Fsc-if>\n    <\u002Fsection>\n\n    <!-- ============ ÜBER MICH ============ -->\n    <section id=\"ueber-mich\" style=\"background:var(--surface-2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)\">\n      <div data-reveal=\"\" style=\"max-width:1200px;margin:0 auto;padding:clamp(56px,9vw,120px) clamp(18px,5vw,56px);display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:clamp(28px,5vw,64px);align-items:center\">\n        <div style=\"position:relative;aspect-ratio:4/5;border-radius:26px;overflow:hidden;background:var(--surface);background-image:repeating-linear-gradient(135deg, var(--surface) 0 22px, var(--surface-3) 22px 44px);border:1px solid var(--border);max-width:480px\">\n          <span aria-hidden=\"true\" style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,Menlo,monospace;font-size:13px;color:var(--muted);text-align:center;padding:24px\">FOTO&nbsp;.webp&nbsp;—&nbsp;Porträt&nbsp;Anna,&nbsp;hochkant<\u002Fspan>\n        <\u002Fdiv>\n        <div>\n          <span style=\"font-weight:700;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--wine)\">Über mich<\u002Fspan>\n          <h2 style=\"font-size:clamp(1.9rem,4vw,2.9rem);line-height:1.08;letter-spacing:-.02em;font-weight:800;margin:14px 0 0\">Hallo, ich bin Anna.<\u002Fh2>\n          <p style=\"font-size:clamp(1.05rem,1.7vw,1.22rem);line-height:1.6;margin:18px 0 0\">Ich lebe und arbeite in Berlin Rudow – mit viel Herz für Hunde und die Menschen an ihrer Seite. Mir geht es nicht um schnelle Tricks, sondern um echtes Verstehen: zwischen dir und deinem Hund.<\u002Fp>\n          <p style=\"font-size:clamp(1rem,1.6vw,1.12rem);line-height:1.65;color:var(--muted);margin:16px 0 0\">Egal ob junger Wirbelwind, unsicherer Tierschutzhund oder cooler Familienbegleiter – wir finden gemeinsam den Weg, der zu euch passt. Ehrlich, geduldig und auf Augenhöhe.<\u002Fp>\n          <a href=\"#kontakt\" style=\"display:inline-block;margin-top:26px;background:var(--wine);color:var(--on-wine);padding:14px 24px;border-radius:999px;white-space:nowrap;text-decoration:none;font-weight:700;font-size:16px\" style-hover=\"filter:brightness(1.07)\">Lern mich kennen<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ KURSE / PLATTFORM (COMING SOON) ============ -->\n    <section id=\"kurse\" style=\"max-width:1200px;margin:0 auto;padding:clamp(56px,9vw,128px) clamp(18px,5vw,56px)\">\n      <div data-reveal=\"\" style=\"position:relative;overflow:hidden;border-radius:28px;background:var(--wine);color:var(--on-wine);padding:clamp(34px,5vw,72px)\">\n        <span aria-hidden=\"true\" style=\"position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;border:2px solid color-mix(in srgb, var(--on-wine) 22%, transparent)\"><\u002Fspan>\n        <span aria-hidden=\"true\" style=\"position:absolute;right:30px;bottom:-90px;width:200px;height:200px;border-radius:50%;border:2px solid color-mix(in srgb, var(--on-wine) 18%, transparent)\"><\u002Fspan>\n        <div style=\"position:relative;max-width:62ch\">\n          <span style=\"display:inline-flex;align-items:center;gap:8px;background:color-mix(in srgb, var(--on-wine) 16%, transparent);padding:7px 15px;border-radius:999px;font-weight:700;font-size:13px;letter-spacing:.06em;text-transform:uppercase\">Bald verfügbar<\u002Fspan>\n          <h2 style=\"font-size:clamp(1.9rem,4vw,3rem);line-height:1.08;letter-spacing:-.02em;font-weight:800;margin:16px 0 0\">Online- &amp; Video-Kurse<\u002Fh2>\n          <p style=\"font-size:clamp(1.05rem,1.8vw,1.25rem);line-height:1.55;margin:16px 0 0;opacity:.92\">Lernen, wann und wo es für euch passt – verzahnt mit persönlichem Training und eng vernetzt mit Instagram &amp; WhatsApp. Trag dich unverbindlich ein und sei zuerst dabei.<\u002Fp>\n          <a href=\"{{ kurseMailto }}\" style=\"display:inline-block;margin-top:28px;background:var(--on-wine);color:var(--wine);padding:15px 26px;border-radius:999px;white-space:nowrap;text-decoration:none;font-weight:700;font-size:17px\" style-hover=\"filter:brightness(.96)\">Auf die Warteliste<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ TIERSCHUTZ / KITMIR ============ -->\n    <section id=\"tierschutz\" style=\"background:var(--surface-2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)\">\n      <div data-reveal=\"\" style=\"max-width:1200px;margin:0 auto;padding:clamp(56px,9vw,120px) clamp(18px,5vw,56px);display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:clamp(28px,5vw,64px);align-items:center\">\n        <div>\n          <span style=\"display:inline-flex;align-items:center;gap:9px;font-weight:700;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--wine)\">\n            <span aria-hidden=\"true\" style=\"display:inline-block;width:16px;height:16px;background:var(--wine);clip-path:path('M8 14C8 14 1 9.5 1 5.2C1 2.8 2.8 1.5 4.4 1.5C6 1.5 7 2.6 8 3.8C9 2.6 10 1.5 11.6 1.5C13.2 1.5 15 2.8 15 5.2C15 9.5 8 14 8 14Z')\"><\u002Fspan>\n            Herzensthema\n          <\u002Fspan>\n          <h2 style=\"font-size:clamp(1.9rem,4vw,2.9rem);line-height:1.08;letter-spacing:-.02em;font-weight:800;margin:14px 0 0\">Aktiv im Tierschutz – mit KITMIR.<\u002Fh2>\n          <p style=\"font-size:clamp(1.05rem,1.7vw,1.22rem);line-height:1.6;margin:18px 0 0\">Tierschutz liegt mir am Herzen. Ich engagiere mich aktiv bei <strong>KITMIR<\u002Fstrong> und setze mich für Hunde ein, die einen guten Start ins neue Leben brauchen.<\u002Fp>\n          <p style=\"font-size:clamp(1rem,1.6vw,1.12rem);line-height:1.65;color:var(--muted);margin:14px 0 0\">Viele meiner liebsten Begegnungen beginnen als Tierschutzhund. Genau dieses Wissen fließt in mein Training ein – mit besonders viel Geduld und Verständnis.<\u002Fp>\n          <a href=\"https://kitmir.de\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"display:inline-flex;align-items:center;gap:8px;margin-top:24px;border:1px solid var(--wine);color:var(--wine);padding:13px 22px;border-radius:999px;white-space:nowrap;text-decoration:none;font-weight:700;font-size:16px\" style-hover=\"background:var(--wine);color:var(--on-wine)\">KITMIR kennenlernen<span aria-hidden=\"true\">→<\u002Fspan><\u002Fa>\n        <\u002Fdiv>\n        <div style=\"position:relative;aspect-ratio:5/4;border-radius:26px;overflow:hidden;background:var(--surface);background-image:repeating-linear-gradient(135deg, var(--surface) 0 22px, var(--surface-3) 22px 44px);border:1px solid var(--border)\">\n          <span aria-hidden=\"true\" style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,Menlo,monospace;font-size:13px;color:var(--muted);text-align:center;padding:24px\">FOTO&nbsp;.webp&nbsp;—&nbsp;Tierschutzhund&nbsp;/&nbsp;KITMIR<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ FAQ ============ -->\n    <section aria-label=\"Häufige Fragen\" style=\"max-width:880px;margin:0 auto;padding:clamp(56px,9vw,120px) clamp(18px,5vw,56px)\">\n      <div data-reveal=\"\" style=\"text-align:center;margin-bottom:clamp(28px,4vw,48px)\">\n        <span style=\"font-weight:700;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--wine)\">Häufige Fragen<\u002Fspan>\n        <h2 style=\"font-size:clamp(1.8rem,4vw,2.7rem);line-height:1.08;letter-spacing:-.02em;font-weight:800;margin:12px 0 0\">Gut zu wissen.<\u002Fh2>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"display:flex;flex-direction:column;gap:12px\">\n        <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"4\">\n          <details style=\"background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:4px 22px;box-shadow:var(--shadow)\">\n            <summary style=\"cursor:pointer;list-style:none;padding:18px 0;font-weight:700;font-size:clamp(1.05rem,1.8vw,1.22rem);display:flex;align-items:center;justify-content:space-between;gap:16px\">{{ f.q }}<span aria-hidden=\"true\" style=\"color:var(--wine);font-size:1.5em;line-height:1;flex:0 0 auto\">+<\u002Fspan><\u002Fsummary>\n            <p style=\"color:var(--muted);font-size:1.05rem;line-height:1.6;margin:0;padding:0 0 20px\">{{ f.a }}<\u002Fp>\n          <\u002Fdetails>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ KONTAKT ============ -->\n    <section id=\"kontakt\" style=\"background:var(--surface-2);border-top:1px solid var(--border)\">\n      <div data-reveal=\"\" style=\"max-width:1100px;margin:0 auto;padding:clamp(56px,9vw,120px) clamp(18px,5vw,56px)\">\n        <div style=\"text-align:center;max-width:60ch;margin:0 auto\">\n          <span style=\"font-weight:700;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--wine)\">Kontakt<\u002Fspan>\n          <h2 style=\"font-size:clamp(2rem,4.4vw,3.2rem);line-height:1.06;letter-spacing:-.02em;font-weight:800;margin:14px 0 0;text-wrap:balance\">Lass uns reden.<\u002Fh2>\n          <p style=\"color:var(--muted);font-size:clamp(1.05rem,1.8vw,1.25rem);margin:16px auto 0\">Welcher Weg dir am liebsten ist, entscheidest du. Schreib mir einfach – ich freue mich auf euch.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,230px),1fr));gap:14px;margin-top:clamp(32px,5vw,52px)\">\n          <a href=\"{{ whatsappHref }}\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"Per WhatsApp schreiben\" style=\"background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px;text-decoration:none;display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow)\" style-hover=\"border-color:var(--wine);transform:translateY(-3px)\">\n            <span aria-hidden=\"true\" style=\"width:42px;height:42px;border-radius:50%;border:2px solid var(--wine);display:flex;align-items:center;justify-content:center\"><span style=\"width:12px;height:12px;border-radius:50%;background:var(--wine)\"><\u002Fspan><\u002Fspan>\n            <span style=\"font-weight:700;font-size:1.15rem;margin-top:6px\">WhatsApp<\u002Fspan>\n            <span style=\"color:var(--muted);font-size:.98rem\">Schnelle Nachricht oder Anruf<\u002Fspan>\n          <\u002Fa>\n          <a href=\"https://www.instagram.com/hundetraining_anna_p\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"Auf Instagram folgen und schreiben\" style=\"background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px;text-decoration:none;display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow)\" style-hover=\"border-color:var(--wine);transform:translateY(-3px)\">\n            <span aria-hidden=\"true\" style=\"width:42px;height:42px;border-radius:12px;border:2px solid var(--wine);display:flex;align-items:center;justify-content:center\"><span style=\"width:12px;height:12px;border-radius:50%;border:2px solid var(--wine)\"><\u002Fspan><\u002Fspan>\n            <span style=\"font-weight:700;font-size:1.15rem;margin-top:6px\">Instagram<\u002Fspan>\n            <span style=\"color:var(--muted);font-size:.98rem\">Bilder, Stories &amp; DMs<\u002Fspan>\n          <\u002Fa>\n          <a href=\"https://www.facebook.com/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"Auf Facebook besuchen\" style=\"background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px;text-decoration:none;display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow)\" style-hover=\"border-color:var(--wine);transform:translateY(-3px)\">\n            <span aria-hidden=\"true\" style=\"width:42px;height:42px;border-radius:12px;border:2px solid var(--wine);display:flex;align-items:center;justify-content:center\"><span style=\"width:8px;height:16px;border-radius:2px;background:var(--wine)\"><\u002Fspan><\u002Fspan>\n            <span style=\"font-weight:700;font-size:1.15rem;margin-top:6px\">Facebook<\u002Fspan>\n            <span style=\"color:var(--muted);font-size:.98rem\">Neuigkeiten &amp; Termine<\u002Fspan>\n          <\u002Fa>\n          <a href=\"{{ kontaktMailto }}\" aria-label=\"E-Mail schreiben (öffnet dein Mail-Programm)\" style=\"background:var(--wine);color:var(--on-wine);border:1px solid var(--wine);border-radius:20px;padding:26px;text-decoration:none;display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow)\" style-hover=\"filter:brightness(1.07);transform:translateY(-3px)\">\n            <span aria-hidden=\"true\" style=\"width:42px;height:42px;border-radius:12px;border:2px solid var(--on-wine);display:flex;align-items:center;justify-content:center\"><span style=\"width:16px;height:11px;border:2px solid var(--on-wine);border-radius:2px\"><\u002Fspan><\u002Fspan>\n            <span style=\"font-weight:700;font-size:1.15rem;margin-top:6px\">E-Mail<\u002Fspan>\n            <span style=\"opacity:.9;font-size:.98rem\">Öffnet dein Mail-Programm<\u002Fspan>\n          <\u002Fa>\n        <\u002Fdiv>\n        <p style=\"text-align:center;color:var(--muted);font-size:1rem;margin:clamp(28px,4vw,40px) 0 0\">Einzeltraining &amp; Social Walks in ganz Berlin · Gruppenkurse in <strong style=\"color:var(--fg)\">Berlin Alt-Rudow<\u002Fstrong><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n\n  <footer style=\"background:var(--bg);border-top:1px solid var(--border)\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:clamp(40px,5vw,64px) clamp(18px,5vw,56px);display:flex;flex-wrap:wrap;gap:28px;justify-content:space-between;align-items:flex-start\">\n      <div style=\"max-width:34ch\">\n        <div style=\"display:flex;align-items:center;gap:11px;font-weight:800\">\n          <span aria-hidden=\"true\" style=\"width:32px;height:32px;border-radius:50%;border:2px solid var(--wine);display:flex;align-items:center;justify-content:center\"><span style=\"width:10px;height:10px;border-radius:50%;background:var(--wine)\"><\u002Fspan><\u002Fspan>\n          Anna Prädel · Hundetraining\n        <\u002Fdiv>\n        <p style=\"color:var(--muted);font-size:.98rem;margin:14px 0 0;line-height:1.6\">Beziehung statt Druck. Einfühlsames Hundetraining in Berlin Rudow – für alle Rassen und Größen.<\u002Fp>\n      <\u002Fdiv>\n      <nav aria-label=\"Soziale Netzwerke\" style=\"display:flex;flex-direction:column;gap:10px\">\n        <span style=\"font-weight:700;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)\">Folge mir<\u002Fspan>\n        <a href=\"https://www.instagram.com/hundetraining_anna_p\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"text-decoration:none;font-weight:600\" style-hover=\"color:var(--wine)\">Instagram<\u002Fa>\n        <a href=\"https://www.facebook.com/\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"text-decoration:none;font-weight:600\" style-hover=\"color:var(--wine)\">Facebook<\u002Fa>\n        <a href=\"{{ whatsappHref }}\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"text-decoration:none;font-weight:600\" style-hover=\"color:var(--wine)\">WhatsApp<\u002Fa>\n      <\u002Fnav>\n      <nav aria-label=\"Rechtliches\" style=\"display:flex;flex-direction:column;gap:10px\">\n        <span style=\"font-weight:700;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)\">Rechtliches<\u002Fspan>\n        <a href=\"#impressum\" style=\"text-decoration:none;font-weight:600\" style-hover=\"color:var(--wine)\">Impressum<\u002Fa>\n        <a href=\"#datenschutz\" style=\"text-decoration:none;font-weight:600\" style-hover=\"color:var(--wine)\">Datenschutz<\u002Fa>\n        <a href=\"https://kitmir.de\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"text-decoration:none;font-weight:600\" style-hover=\"color:var(--wine)\">KITMIR e.V.<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid var(--border)\">\n      <p style=\"max-width:1200px;margin:0 auto;padding:20px clamp(18px,5vw,56px);color:var(--muted);font-size:.9rem\">© {{ year }} Anna Prädel · Hundetraining, Berlin Rudow. Mit Herz gemacht.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentMood&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Weinrot klassisch&quot;,&quot;options&quot;:[&quot;Weinrot klassisch&quot;,&quot;Terrakotta&quot;,&quot;Burgund&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;heroVariant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Split&quot;,&quot;options&quot;:[&quot;Vollbild&quot;,&quot;Split&quot;,&quot;Zentriert&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;offerVariant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Karten&quot;,&quot;options&quot;:[&quot;Karten&quot;,&quot;Liste&quot;,&quot;Alternierend&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;defaultTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Hell&quot;,&quot;options&quot;:[&quot;Hell&quot;,&quot;Dunkel&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = (() => {\n    let saved = null;\n    try { saved = localStorage.getItem('apht-theme'); } catch (e) {}\n    const def = (this.props && this.props.defaultTheme === 'Dunkel') ? 'dark' : 'light';\n    const theme = (saved === 'dark' || saved === 'light') ? saved : def;\n    return { theme: theme, isMobile: false, menuOpen: false };\n  })();\n\n  componentDidMount() {\n    try {\n      this._mql = window.matchMedia('(max-width: 880px)');\n      this._onM = () => this.setState({ isMobile: this._mql.matches });\n      if (this._mql.matches !== this.state.isMobile) this.setState({ isMobile: this._mql.matches });\n      if (this._mql.addEventListener) this._mql.addEventListener('change', this._onM);\n      else this._mql.addListener(this._onM);\n    } catch (e) {}\n\n    // Scroll-Reveal (zugänglich: ohne JS bleibt alles sichtbar)\n    requestAnimationFrame(() => requestAnimationFrame(() => {\n      try {\n        const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n        const root = document.getElementById('apht-root');\n        if (reduce || !root || !('IntersectionObserver' in window)) return;\n        const els = root.querySelectorAll('[data-reveal]');\n        els.forEach((el) => {\n          el.style.opacity = '0';\n          el.style.transform = 'translateY(20px)';\n          el.style.transition = 'opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1)';\n        });\n        this._io = new IntersectionObserver((entries) => {\n          entries.forEach((e) => {\n            if (e.isIntersecting) {\n              e.target.style.opacity = '1';\n              e.target.style.transform = 'none';\n              this._io.unobserve(e.target);\n            }\n          });\n        }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n        els.forEach((el) => this._io.observe(el));\n      } catch (e) {}\n    }));\n  }\n\n  componentWillUnmount() {\n    try {\n      if (this._mql) {\n        if (this._mql.removeEventListener) this._mql.removeEventListener('change', this._onM);\n        else this._mql.removeListener(this._onM);\n      }\n    } catch (e) {}\n    try { if (this._io) this._io.disconnect(); } catch (e) {}\n  }\n\n  renderVals() {\n    const accentMap = { 'Weinrot klassisch': 'classic', 'Terrakotta': 'terra', 'Burgund': 'burgund' };\n    const accent = accentMap[this.props.accentMood] || 'classic';\n    const hv = this.props.heroVariant || 'Split';\n    const ov = this.props.offerVariant || 'Karten';\n    const isDark = this.state.theme === 'dark';\n    const isMobile = this.state.isMobile;\n\n    const baseOffers = [\n      { title: 'Allgemeines Training', desc: 'Vom Welpen bis zum Senior: ein Fundament, das zu euch beiden passt.' },\n      { title: 'Grundgehorsam', desc: 'Sitz, Platz, Bleib & Rückruf – verlässlich, fair und ohne Druck.' },\n      { title: 'Mentale Beschäftigung', desc: 'Kopfarbeit, die auslastet und Bindung schafft – oft wirksamer als lange Runden.' },\n      { title: 'Leinenführigkeit', desc: 'Entspannt an lockerer Leine unterwegs, statt ziehen und gezogen werden.' },\n      { title: 'Alleine zuhause bleiben', desc: 'Schritt für Schritt zu echtem Vertrauen, wenn du einmal nicht da bist.' },\n      { title: 'Alltagssituationen', desc: 'Besuch, Café, Bus, Begegnungen – souverän durch den ganz normalen Tag.' },\n      { title: 'Einzeltraining vor Ort', desc: 'Ganz auf euch zugeschnitten, in eurem gewohnten Umfeld in Berlin.', badge: 'Berlin' },\n      { title: 'Gruppenkurse', desc: 'Lernen in der Gruppe – Erfahrung, die im Alltag trägt.', badge: 'max. 6 Teams · Alt-Rudow' },\n      { title: 'Social Walks', desc: 'Gemeinsame Spaziergänge: in Ruhe Erfahrung sammeln, ganz ohne Stress.' }\n    ];\n    const offers = baseOffers.map((o, i) => ({\n      title: o.title,\n      desc: o.desc,\n      badge: o.badge || '',\n      num: String(i + 1).padStart(2, '0'),\n      dir: (ov === 'Alternierend' && i % 2 === 1) ? 'row-reverse' : 'row'\n    }));\n\n    const breeds = ['Labrador', 'Golden Retriever', 'Border Collie', 'Mischling', 'Gebrauchs- & Arbeitshund', 'Tierschutzhund', 'Familienbegleiter'];\n\n    const faqs = [\n      { q: 'Für welche Hunde ist dein Training geeignet?', a: 'Für alle Rassen und Größen – vom Welpen über den Familienbegleiter bis zum Arbeits- und Tierschutzhund. Ich arbeite individuell und passe das Training an euch beide an.' },\n      { q: 'Wo finden die Gruppenkurse statt?', a: 'Die Gruppenkurse finden in Berlin Alt-Rudow statt, in kleinen Gruppen mit maximal 6 Teams. Einzeltraining biete ich bei dir vor Ort in Berlin an.' },\n      { q: 'Bietest du Online-Kurse an?', a: 'Online- und Video-Kurse sind in Vorbereitung. Du kannst dich unverbindlich vormerken lassen und bist dann zuerst dabei.' },\n      { q: 'Wie nehme ich am besten Kontakt auf?', a: 'Am schnellsten per WhatsApp, per Instagram-Nachricht oder E-Mail. Schreib mir einfach – du entscheidest, welcher Weg dir am liebsten ist.' }\n    ];\n\n    const kontaktMailto = 'mailto:hallo@hundetraining-annap.de?subject=' + encodeURIComponent('Anfrage Hundetraining') + '&body=' + encodeURIComponent('Hallo Anna,\\n\\nich interessiere mich für dein Hundetraining.\\n\\nMein Hund (Rasse/Alter):\\nWorum geht es:\\n\\nViele Grüße');\n    const kurseMailto = 'mailto:hallo@hundetraining-annap.de?subject=' + encodeURIComponent('Warteliste Online-/Video-Kurse');\n    const whatsappHref = 'https://wa.me/49XXXXXXXXXXX?text=' + encodeURIComponent('Hallo Anna, ich interessiere mich für dein Hundetraining.');\n\n    return {\n      theme: this.state.theme,\n      accent: accent,\n      desktopNav: !isMobile,\n      mobileNav: isMobile,\n      showMobileMenu: isMobile && this.state.menuOpen,\n      menuOpen: this.state.menuOpen,\n      toggleMenu: () => this.setState((s) => ({ menuOpen: !s.menuOpen })),\n      closeMenu: () => this.setState({ menuOpen: false }),\n      toggleTheme: () => {\n        const next = this.state.theme === 'dark' ? 'light' : 'dark';\n        this.setState({ theme: next });\n        try { localStorage.setItem('apht-theme', next); } catch (e) {}\n      },\n      themeBtnLabel: isDark ? 'Zum hellen Modus wechseln' : 'Zum dunklen Modus wechseln',\n      themeBtnText: isDark ? 'Hell' : 'Dunkel',\n      themeDotBg: isDark ? 'var(--wine)' : 'transparent',\n      heroVollbild: hv === 'Vollbild',\n      heroSplit: hv === 'Split',\n      heroZentriert: hv === 'Zentriert',\n      showCards: ov === 'Karten',\n      showList: ov !== 'Karten',\n      offers: offers,\n      breeds: breeds,\n      faqs: faqs,\n      kontaktMailto: kontaktMailto,\n      kurseMailto: kurseMailto,\n      whatsappHref: whatsappHref,\n      year: new Date().getFullYear()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
